    <!-- UPDATED SIDEBAR -->

        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"> NEETly System

        <div class="menu-item"><a href="dashboard.html">Dashboard</a></div>

    <!-- MAIN CONTENT (UNCHANGED) -->
    <div class="main">

        <div class="title">🧠 Adaptive Profile Setup</div>

        <div class="card">
            <h2>Set Up Your Learning Preferences</h2>

            <!-- your existing form preserved -->
            <label>Subject:</label>
            <select id="subjectSelect">
                <option value="">Select Subject</option>
                <option>Physics</option>
                <option>Chemistry</option>
                <option>Biology</option>
            </select>

            <label>Knowledge Level:</label>
            <div class="radio-group">
                <label><input type="radio" name="lvl" value="Beginner"> Beginner</label>
                <label><input type="radio" name="lvl" value="Intermediate"> Intermediate</label>
                <label><input type="radio" name="lvl" value="Advanced"> Advanced</label>
            </div>

            <label>Preferred Learning Style:</label>
            <select id="styleSelect">
                <option value="">Select Style</option>
                <option>Visual (Diagrams)</option>
                <option>Text Explanation</option>
                <option>Video Lessons</option>
            </select>

            <button class="btn" onclick="saveProfile()">Save Profile</button>

            <div id="successBox" class="success-box">✔ Profile Saved Successfully!</div>
        </div>
    </div>
