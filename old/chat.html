<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEETly Chat Assistant</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="neetly.css">

</head>

<body>

    <!-- UPDATED SIDEBAR -->
    <div class="sidebar">
        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png"> NEETly System
        </div>

        <div class="menu-item"><a href="dashboard.html">Dashboard</a></div>
        <div class="menu-item"><a href="learn.html">Learn</a></div>
        <div class="menu-item"><a href="studyhub.html">Study Hub</a></div>
        <div class="menu-item active"><a href="chat.html">Chat Assistant</a></div>
        <div class="menu-item"><a href="planner.html">Revision Planner</a></div>

    </div>

    <!-- CHAT PANEL -->
    <div class="chat-container">

        <div class="header">🤖 NEETly Chat Assistant</div>

        <div id="messages" class="messages-box"></div>

        <div class="input-area">
            <input id="userInput" type="text" placeholder="Ask anything...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

<script>
    const API = "http://127.0.0.1:8000/api/chat";
    const box = document.getElementById("messages");

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text) return;

        box.innerHTML += `<div class='msg-user'>${text}</div>`;
        input.value = "";
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            const data = await res.json();

            box.innerHTML += `<div class='msg-ai'>${data.reply}</div>`;
            box.scrollTop = box.scrollHeight;

        } catch (err) {
            box.innerHTML += `<div class='msg-ai' style="color:red;">Server error</div>`;
        }
    }
</script>

</body>
</html>
