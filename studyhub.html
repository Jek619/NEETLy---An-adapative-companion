    <link rel="stylesheet" href="neetly.css" />
</head>

<body>

<!-- ======================
     SIDEBAR
====================== -->
<div class="sidebar">

  <!-- TOP -->
  <div class="sidebar-top">
    <div class="welcome-box">
      <span class="welcome-label">Welcome</span>
      <span class="welcome-name" id="welcomeUser">USER</span>
    </div>
  </div>

  <!-- MENU -->
 <nav class="menu">
  <a href="dashboard.html" class="menu-item">Dashboard</a>
  <a href="learn.html" class="menu-item">Learn</a>

  <!-- BOTTOM -->

    <a href="profile.html" class="menu-item profile-link">
      <span class="profile-badge">👤</span>
      <span>Profile</span>
    </a>

</div>

<!-- ======================
     MAIN CONTENT
====================== -->
<div class="main">

    <h1 class="page-title">🚀 Take a Quiz</h1>

    <div id="quizTab">

        <div class="quiz-wrapper">
            <div class="quiz-box">

                <div class="form-row">
                    <label>Subject</label>
                    <select id="subjectSelect">
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Biology">Biology</option>
                    </select>
                </div>

                <div class="form-row">
                    <label>Topic</label>
                    <select id="topicSelect">
                        <option value="">Select Topic</option>
                    </select>
                </div>

                <div class="form-row">
                    <label>Difficulty</label>
                    <select id="difficultySelect">
                        <option value="easy">Easy</option>
                        <option value="medium" selected>Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </div>

                <div class="btn-group">
                    <button id="chooseNone" class="secondary-btn">Random Topic 🎯</button>
                    <button id="generateQuiz" class="primary-btn">Generate Quiz 🚀</button>
                </div>

            </div>

            <div id="quizContainer"></div>
        </div>
    </div>

</div>

    })();

    async function logout() {
        await sb.auth.signOut();
        window.location.href = "index.html";
